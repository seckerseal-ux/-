services:
  - type: web
    name: ielts-lexicon-sprint-api
    runtime: python
    buildCommand: python -m py_compile server.py
    startCommand: python server.py
    healthCheckPath: /api/ai/status
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: BACKEND_STORAGE_DIR
        value: /tmp/ielts-lexicon-sprint-data
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_BASE_URL
        value: https://aihubmix.com/v1
      - key: AIHUBMIX_BASE_URL
        value: https://aihubmix.com/v1
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gemini-3-flash-preview-free
      - key: OPENAI_REVIEW_MODEL
        value: gemini-3-flash-preview-free
      - key: OPENAI_WRITING_REVIEW_MODEL
        value: gemini-3-flash-preview-free
      - key: AIHUBMIX_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: app-data
      mountPath: /opt/data
      sizeGB: 1
